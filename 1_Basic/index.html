<html>

<head>
    <meta charset=utf-8>
    <title>dev 25-05-2026</title>
    <style>
        body {
            margin: 0;
        }

        canvas {
            width: 100%;
            height: 100%
        }
    </style>
</head>

<body>
    <script type="module">
        import * as THREE from './three.module.js';
        import { OrbitControls } from './orbitcontrols.js';

        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

        var renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // torusknot
        const geometry = new THREE.TorusKnotGeometry(1, 0.4, 100, 16);
        const material = new THREE.MeshBasicMaterial({ color: "#f70071" });
        const torusKnot = new THREE.Mesh(geometry, material);

        torusKnot.castShadow = true;
        torusKnot.position.set(1, 1, 2);

        scene.add(torusKnot);

        // LIGHT
        var light = new THREE.DirectionalLight(0xffffff, 1, 10);
        light.position.set(-1, 1, 1);
        light.castShadow = true;
        scene.add(light);

        // PLANE
        var planeGeometry = new THREE.PlaneGeometry(20, 20, 32, 32);
        var planeMaterial = new THREE.MeshStandardMaterial({ color: "gray" });
        var plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.receiveShadow = true;
        plane.position.set(0, 0, 0);
        scene.add(plane);

        camera.position.z = 6;
        camera.position.y = -4;
        camera.rotation.x = .5;

        const controls = new OrbitControls(camera, renderer.domElement);
        // controls.enableZoom = false;
        // controls.minDistance = 1;
        // controls.maxDistance = 15;
        //controls.screenSpacePanning = false;
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;

        function render() {
            torusKnot.rotation.x += 0.01;
            torusKnot.rotation.y += 0.01;
            requestAnimationFrame(render);
            renderer.render(scene, camera);
        }
        render();
    </script>
</body>
